<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>计时器</title>
    <link rel="icon" href="https://user-assets.sxlcdn.com/images/1209238/FlWuslNmGTHt1EipxUtq2GI6zqnN.png?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" type="image/png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #ff9a9e, #fad0c4 40%, #fbc2eb);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        h1 {
            font-size: 40px;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.35);
            margin-bottom: 18px;
            letter-spacing: 4px;
        }

        .sub-title {
            color: #ffecec;
            font-size: 14px;
            margin-bottom: 24px;
            opacity: 0.9;
        }

        .timer-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 18px;
            padding: 28px 32px 32px;
            width: 360px;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.05);
            color: #f3f3f3;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ff9f7f);
            border-color: transparent;
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
        }

        #showTime {
            font-size: 52px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 16px;
            margin-top: 4px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.65);
        }

        .status-text {
            font-size: 12px;
            color: #cfcfcf;
            margin-bottom: 12px;
        }

        .countdown-settings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #f1f1f1;
        }

        .countdown-settings input {
            width: 64px;
            padding: 5px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            outline: none;
            text-align: center;
        }

        .countdown-settings input:focus {
            border-color: #ff9f7f;
            box-shadow: 0 0 6px rgba(255, 159, 127, 0.7);
        }

        .countdown-settings label {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 4px;
        }

        #startBn,
        #restBn,
        #setCountdown {
            min-width: 90px;
            height: 38px;
            padding: 0 14px;
            font-size: 14px;
            background: #ff6b6b;
            color: #ffffff;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        #restBn {
            background: #4a4a4a;
        }

        #setCountdown {
            background: #ff9f7f;
            height: 32px;
            font-size: 13px;
        }

        #startBn:hover,
        #restBn:hover,
        #setCountdown:hover {
            transform: translateY(-1px) scale(1.03);
            box-shadow: 0 7px 15px rgba(0, 0, 0, 0.4);
            opacity: 0.95;
        }

        #startBn:active,
        #restBn:active,
        #setCountdown:active {
            transform: translateY(1px) scale(0.97);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
        }

        .hidden {
            display: none;
        }

        .tip {
            margin-top: 10px;
            font-size: 12px;
            color: #bdbdbd;
        }
    </style>
</head>

<body>

    <h1>计时器</h1>
    <div class="sub-title">支持正计时与倒计时 · 精准到 1/100 秒</div>

    <div class="timer-container">
        <div class="mode-switch">
            <button id="upMode" class="mode-btn active">正计时</button>
            <button id="downMode" class="mode-btn">倒计时</button>
        </div>

        <div id="countdownSettings" class="countdown-settings hidden">
            <label>
                分钟
                <input id="minsInput" type="number" min="0" max="599" value="1">
            </label>
            <label>
                秒
                <input id="secsInput" type="number" min="0" max="59" value="0">
            </label>
            <button id="setCountdown">设置</button>
        </div>

        <div id="showTime">00:00:00</div>
        <div class="status-text" id="statusText">当前模式：正计时</div>

        <div class="btn-row">
            <button id="startBn">启动</button>
            <button id="restBn">复位</button>
        </div>
        <div class="tip">提示：先选择模式，再启动；倒计时可自定义时长。</div>
    </div>

    <script>
        var time, showTime, startBn, restBn;
        var upModeBtn, downModeBtn, countdownSettings;
        var minsInput, secsInput, setCountdownBtn, statusText;

        var bool = false;          // 是否正在运行
        var pauseTime = 0;         // 累计暂停时间
        var pauseDate = null;      // 暂停开始时间
        var mode = 'up';           // 'up' 正计时, 'down' 倒计时
        var totalCountdown = 0;    // 倒计时时间总毫秒
        var initCountdown = 0;     // 倒计时初始毫秒（用于复位）

        init();

        function init() {
            showTime = document.getElementById("showTime");
            startBn = document.getElementById("startBn");
            restBn = document.getElementById("restBn");
            upModeBtn = document.getElementById("upMode");
            downModeBtn = document.getElementById("downMode");
            countdownSettings = document.getElementById("countdownSettings");
            minsInput = document.getElementById("minsInput");
            secsInput = document.getElementById("secsInput");
            setCountdownBtn = document.getElementById("setCountdown");
            statusText = document.getElementById("statusText");

            startBn.addEventListener("click", clickHandler);  // 启动/暂停
            restBn.addEventListener("click", clickHandler);   // 复位
            upModeBtn.addEventListener("click", function () {
                setMode('up');
            });
            downModeBtn.addEventListener("click", function () {
                setMode('down');
            });
            setCountdownBtn.addEventListener("click", applyCountdown);

            // 默认初始化一个 1 分钟的倒计时配置
            initCountdown = 60 * 1000;
            totalCountdown = initCountdown;

            setInterval(animation, 16); // 约 60 帧
        }

        // 刷新显示
        function animation() {
            if (!bool) return;

            var now = new Date().getTime();
            var elapsed = now - time - pauseTime;  // 已用时间（毫秒）

            if (mode === 'up') {
                if (elapsed < 0) elapsed = 0;
                showTime.innerHTML = formatTime(elapsed);
            } else {
                var remaining = totalCountdown - elapsed;
                if (remaining <= 0) {
                    remaining = 0;
                    bool = false;
                    startBn.innerHTML = "启动";
                    pauseDate = null;
                }
                showTime.innerHTML = formatTime(remaining);
            }
        }

        // 将毫秒格式化为 mm:ss:MS
        function formatTime(ms) {
            if (ms < 0) ms = 0;
            var minutes = Math.floor(ms / 60000);
            var seconds = Math.floor((ms - minutes * 60000) / 1000);
            var centiseconds = Math.floor((ms - minutes * 60000 - seconds * 1000) / 10);

            return (minutes < 10 ? "0" + minutes : minutes) + ":" +
                (seconds < 10 ? "0" + seconds : seconds) + ":" +
                (centiseconds < 10 ? "0" + centiseconds : centiseconds);
        }

        // 切换模式
        function setMode(newMode) {
            if (mode === newMode) return;

            mode = newMode;

            // 切换模式时统一复位当前计时状态
            bool = false;
            startBn.innerHTML = "启动";
            pauseTime = 0;
            pauseDate = null;
            time = 0;

            if (mode === 'up') {
                countdownSettings.classList.add("hidden");
                upModeBtn.classList.add("active");
                downModeBtn.classList.remove("active");
                showTime.innerHTML = "00:00:00";
                statusText.innerHTML = "当前模式：正计时";
            } else {
                countdownSettings.classList.remove("hidden");
                downModeBtn.classList.add("active");
                upModeBtn.classList.remove("active");
                if (!initCountdown) {
                    initCountdown = 60 * 1000;
                    totalCountdown = initCountdown;
                }
                showTime.innerHTML = formatTime(totalCountdown);
                statusText.innerHTML = "当前模式：倒计时";
            }
        }

        // 设置倒计时时长
        function applyCountdown() {
            var mins = parseInt(minsInput.value, 10) || 0;
            var secs = parseInt(secsInput.value, 10) || 0;

            if (mins < 0) mins = 0;
            if (secs < 0) secs = 0;
            if (secs > 59) secs = 59;

            var totalMs = (mins * 60 + secs) * 1000;
            if (totalMs <= 0) {
                // 最少 1 秒，防止设置为 0
                totalMs = 1000;
            }

            initCountdown = totalMs;
            totalCountdown = totalMs;

            // 重新开始前先清空状态
            bool = false;
            startBn.innerHTML = "启动";
            pauseTime = 0;
            pauseDate = null;
            time = 0;

            showTime.innerHTML = formatTime(totalCountdown);
        }

        // 按钮事件
        function clickHandler(e) {
            e = e || window.event;

            if (this === startBn) {
                bool = !bool;

                if (bool) {
                    // 从暂停 -> 继续，或首次启动
                    this.innerHTML = "暂停";

                    pauseTime += (!pauseDate ? 0 : new Date().getTime() - pauseDate);

                    // 首次启动时初始化基准时间
                    if (time) return;
                    time = new Date().getTime();
                    return;
                }

                // 从运行 -> 暂停
                this.innerHTML = "启动";
                pauseDate = new Date().getTime();
                return;
            }

            // 复位逻辑
            startBn.innerHTML = "启动";
            pauseTime = 0;
            pauseDate = null;
            bool = false;
            time = 0;

            if (mode === 'up') {
                showTime.innerHTML = "00:00:00";
            } else {
                showTime.innerHTML = formatTime(initCountdown || totalCountdown || 0);
            }
        }
    </script>

</body>
</html>
