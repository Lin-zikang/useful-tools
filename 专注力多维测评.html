<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专注力多维测评</title>
    <link rel="icon"
    href="https://user-assets.sxlcdn.com/images/1209238/FlWuslNmGTHt1EipxUtq2GI6zqnN.png?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png"
    type="image/png" />
    <style>
        :root {
            --bg: #f9f6f1;
            --card-bg: #ffffff;
            --text: #3d3a4d;
            --text-secondary: #6b6780;
            --accent: #f0a8b8;
            --accent2: #a8c8f0;
            --accent3: #b8e0c8;
            --accent4: #f0d8a8;
            --accent5: #c8b8e8;
            --btn-primary: #f090a8;
            --btn-primary-hover: #e87890;
            --btn-success: #88c8a0;
            --btn-success-hover: #70b888;
            --btn-danger: #f0a090;
            --btn-neutral: #e8e4df;
            --btn-neutral-hover: #d8d4cf;
            --btn-export: #7eb8da;
            --btn-export-hover: #5da0c8;
            --shadow-sm: 0 2px 8px rgba(60, 50, 40, 0.06);
            --shadow-md: 0 6px 20px rgba(60, 50, 40, 0.10);
            --shadow-lg: 0 12px 36px rgba(60, 50, 40, 0.14);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
            --color-red: #e8556d;
            --color-blue: #4a90d9;
            --color-green: #4caf84;
            --color-yellow: #d4a843;
            --color-orange: #e8885a;
            --color-purple: #8b6db8;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #fefaf3 0%, #fdf3f0 25%, #f3f6fd 50%, #f6faf4 75%, #fefaf3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 2.5vw, 20px);
            padding-bottom: calc(clamp(10px, 2.5vw, 20px) + var(--safe-bottom));
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            position: relative;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: clamp(18px, 4vw, 30px) clamp(14px, 3.5vw, 26px);
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
            border: 1px solid rgba(200, 190, 180, 0.2);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3), var(--accent4), var(--accent5));
            border-radius: 3px 3px 0 0;
        }
        @media (max-width: 480px) {
            .card {
                padding: 16px 12px;
                border-radius: var(--radius-lg);
            }
            .card::before {
                height: 2px;
            }
        }

        .progress-bar-outer {
            background: #f0ece6;
            border-radius: 20px;
            height: clamp(6px, 1.2vw, 9px);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #f0a8b8, #a8c8f0, #88c8a0, #f0d8a8);
            background-size: 300% 100%;
            animation: progressShimmer 2s ease-in-out infinite;
            transition: width 0.5s ease;
            width: 0%;
        }
        @keyframes progressShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .progress-label {
            font-size: clamp(0.7rem, 1.4vw, 0.82rem);
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: clamp(1.35rem, 3.2vw, 1.9rem);
            font-weight: 700;
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 6px;
            color: #3d3a4d;
        }
        h2 {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-weight: 650;
            text-align: center;
            margin-bottom: 4px;
            color: #3d3a4d;
        }
        h3 {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 600;
            text-align: center;
            color: #3d3a4d;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: clamp(0.78rem, 1.5vw, 0.92rem);
            margin-bottom: 18px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-weight: 600;
            border-radius: 30px;
            padding: clamp(10px, 2vw, 14px) clamp(18px, 3.5vw, 30px);
            font-size: clamp(0.85rem, 1.6vw, 1rem);
            transition: all var(--transition);
            letter-spacing: 0.3px;
            min-height: clamp(40px, 7vw, 50px);
            gap: 6px;
            white-space: nowrap;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
        .btn-primary {
            background: var(--btn-primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(240, 144, 168, 0.35);
        }
        .btn-primary:hover {
            background: var(--btn-primary-hover);
            box-shadow: 0 6px 18px rgba(240, 144, 168, 0.45);
            transform: translateY(-1px);
        }
        .btn-success {
            background: var(--btn-success);
            color: #fff;
            box-shadow: 0 4px 14px rgba(136, 200, 160, 0.35);
        }
        .btn-success:hover {
            background: var(--btn-success-hover);
            box-shadow: 0 6px 18px rgba(136, 200, 160, 0.45);
            transform: translateY(-1px);
        }
        .btn-neutral {
            background: var(--btn-neutral);
            color: #5a5668;
            box-shadow: var(--shadow-sm);
        }
        .btn-neutral:hover {
            background: var(--btn-neutral-hover);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .btn-export {
            background: var(--btn-export);
            color: #fff;
            box-shadow: 0 4px 14px rgba(126, 184, 218, 0.35);
        }
        .btn-export:hover {
            background: var(--btn-export-hover);
            box-shadow: 0 6px 18px rgba(126, 184, 218, 0.45);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: #fff;
            color: #5a5668;
            border: 2px solid #d8d4cf;
            box-shadow: var(--shadow-sm);
        }
        .btn-outline:hover {
            border-color: #b5b0a8;
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .btn-large {
            padding: clamp(13px, 2.5vw, 17px) clamp(28px, 5vw, 44px);
            font-size: clamp(0.95rem, 1.8vw, 1.18rem);
            border-radius: 36px;
            min-height: clamp(48px, 8vw, 58px);
            letter-spacing: 0.5px;
        }
        .btn-block {
            display: flex;
            width: 100%;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-sm {
            padding: clamp(7px, 1.3vw, 10px) clamp(14px, 2.5vw, 20px);
            font-size: clamp(0.72rem, 1.3vw, 0.82rem);
            min-height: clamp(34px, 5.5vw, 40px);
            border-radius: 24px;
        }
        @media (max-width: 480px) {
            .btn { border-radius: 26px; }
            .btn-large { border-radius: 30px; }
            .btn-sm { border-radius: 20px; }
        }

        .color-btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(7px, 1.5vw, 11px);
            justify-content: center;
            margin-top: 12px;
        }
        .color-btn {
            width: clamp(44px, 9vw, 60px);
            height: clamp(44px, 9vw, 60px);
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            font-size: clamp(0.6rem, 1.1vw, 0.72rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.5px;
        }
        .color-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
            border-color: rgba(255, 255, 255, 0.7);
        }
        .color-btn:active {
            transform: scale(0.9);
            transition: transform 0.1s ease;
        }
        @media (max-width: 480px) {
            .color-btn {
                width: clamp(38px, 10vw, 48px);
                height: clamp(38px, 10vw, 48px);
                font-size: 0.6rem;
                border-width: 2px;
            }
            .color-btn-grid { gap: 6px; }
        }

        .stimulus-word {
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
            min-height: clamp(85px, 16vw, 130px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .digit-display {
            font-size: clamp(3rem, 7.5vw, 5.5rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: clamp(3px, 1vw, 8px);
            font-family: var(--font-mono);
            min-height: clamp(90px, 18vw, 140px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3d3a4d;
            transition: all 0.1s ease;
        }

        .cpt-letter {
            font-size: clamp(4rem, 9vw, 6.5rem);
            font-weight: 900;
            text-align: center;
            font-family: var(--font-mono);
            min-height: clamp(100px, 20vw, 160px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.08s ease;
            letter-spacing: 0;
        }

        .search-grid {
            display: grid;
            gap: clamp(2px, 0.5vw, 4px);
            justify-content: center;
            margin: 10px auto;
            max-width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .search-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf8f5;
            border-radius: clamp(2px, 0.5vw, 4px);
            font-weight: 700;
            font-family: var(--font-mono);
            cursor: default;
            transition: background 0.15s;
            aspect-ratio: 1;
            border: 1px solid #ece8e0;
            color: #4a4560;
            min-width: 0;
            overflow: hidden;
        }

        .input-large {
            font-size: clamp(1.2rem, 2.5vw, 1.7rem);
            font-weight: 700;
            text-align: center;
            padding: clamp(10px, 2vw, 15px) clamp(12px, 2.5vw, 18px);
            border-radius: var(--radius);
            border: 2px solid #e0dcd5;
            background: #fdfcf9;
            width: 100%;
            max-width: 280px;
            letter-spacing: clamp(2px, 0.8vw, 5px);
            font-family: var(--font-mono);
            transition: all var(--transition);
            color: #3d3a4d;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: textfield;
        }
        .input-large:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 4px rgba(168, 200, 240, 0.2);
        }
        .input-large::-webkit-inner-spin-button,
        .input-large::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .feedback-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(3rem, 7vw, 5rem);
            pointer-events: none;
            z-index: 100;
            transition: none;
            animation: flashPop 0.6s ease-out forwards;
        }
        @keyframes flashPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
        }
        .feedback-correct { color: #4caf84; }
        .feedback-wrong { color: #e8556d; }

        .result-score-circle {
            width: clamp(100px, 20vw, 135px);
            height: clamp(100px, 20vw, 135px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #fefaf3, #fdf5f0);
            border: clamp(3px, 0.6vw, 5px) solid #e8e0d8;
            position: relative;
            box-shadow: var(--shadow-md);
        }
        .result-score-number {
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 900;
            letter-spacing: -1px;
            color: #3d3a4d;
            line-height: 1;
        }
        .result-score-label {
            font-size: clamp(0.65rem, 1.2vw, 0.78rem);
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .dimension-bar-wrap { margin: clamp(7px, 1.4vw, 11px) 0; }
        .dimension-label-row {
            display: flex;
            justify-content: space-between;
            font-size: clamp(0.75rem, 1.3vw, 0.87rem);
            font-weight: 600;
            margin-bottom: 3px;
            color: #4a4560;
            flex-wrap: wrap;
            gap: 4px;
        }
        .dimension-bar-outer {
            background: #f0ece6;
            border-radius: 12px;
            height: clamp(10px, 1.8vw, 13px);
            overflow: hidden;
        }
        .dimension-bar-inner {
            height: 100%;
            border-radius: 12px;
            transition: width 1s ease;
        }
        .bar-color-1 { background: linear-gradient(90deg, #f0a8b8, #e8789a); }
        .bar-color-2 { background: linear-gradient(90deg, #a8c8f0, #6da8e0); }
        .bar-color-3 { background: linear-gradient(90deg, #b8e0c8, #70c090); }
        .bar-color-4 { background: linear-gradient(90deg, #f0d8a8, #e8b860); }
        .bar-color-5 { background: linear-gradient(90deg, #c8b8e8, #9a7dc8); }
        .bar-color-6 { background: linear-gradient(90deg, #e8c8b8, #d49578); }

        .analysis-card {
            background: #fdfcf9;
            border-radius: var(--radius);
            padding: clamp(12px, 2vw, 17px);
            margin: clamp(6px, 1vw, 9px) 0;
            border: 1px solid #ece8e0;
            text-align: left;
        }
        .analysis-card h4 {
            font-size: clamp(0.82rem, 1.5vw, 0.97rem);
            font-weight: 700;
            margin-bottom: 4px;
            color: #3d3a4d;
        }
        .analysis-card p {
            font-size: clamp(0.72rem, 1.3vw, 0.84rem);
            color: #6b6780;
            line-height: 1.5;
        }
        .tag {
            display: inline-block;
            padding: clamp(3px, 0.6vw, 5px) clamp(10px, 1.8vw, 13px);
            border-radius: 20px;
            font-size: clamp(0.68rem, 1.2vw, 0.77rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 2px 3px;
        }
        .tag-excellent { background: #e6f7ee; color: #3a8a5c; }
        .tag-good { background: #e8f2fb; color: #3a6a9a; }
        .tag-average { background: #fef8ec; color: #8a703a; }
        .tag-needs-work { background: #fef0ec; color: #9a4a3a; }

        .timer-display {
            font-size: clamp(0.75rem, 1.4vw, 0.87rem);
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            letter-spacing: 0.5px;
        }
        .timer-warning {
            color: #e8885a;
            animation: pulse 0.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #3d3a4d;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 200;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.4px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .hidden { display: none !important; }

        .text-center { text-align: center; }
        .mt-8 { margin-top: 8px; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .mt-20 { margin-top: 20px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-12 { margin-bottom: 12px; }
        .mb-16 { margin-bottom: 16px; }
        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-col { display: flex; flex-direction: column; align-items: center; }
        .flex-wrap { flex-wrap: wrap; }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(6px, 1.2vw, 10px);
            justify-content: center;
        }

        .section { animation: fadeSlideIn 0.4s ease; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media print {
            body { background: #fff !important; padding: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .app-container { max-width: 100% !important; }
            .card { box-shadow: none !important; border: 1px solid #ddd !important; border-radius: 8px !important; page-break-inside: avoid; }
            .card::before { background: #888 !important; height: 2px !important; }
            .btn, .progress-bar-outer, .progress-label, .feedback-flash, .toast, #exportButtons, .no-print { display: none !important; }
            .dimension-bar-inner { transition: none !important; }
            .result-score-circle { border-color: #ccc !important; }
            @page { margin: 12mm; size: A4; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app"></div>
    <div class="feedback-flash hidden" id="feedbackFlash"></div>
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const app = document.getElementById('app');
            const feedbackFlash = document.getElementById('feedbackFlash');
            const toast = document.getElementById('toast');

            const state = {
                currentSection: 'welcome',
                stroop: { trials: [], currentTrial: 0, results: [], startTime: 0, _trialStartTime: 0 },
                digitSpan: { currentLevel: 3, maxLevel: 9, sequence: [], userInput: '', results: [], failCount: 0,
                    maxCorrectLevel: 0, phase: 'showing', digitIndex: 0, showingTimer: null, previousSequences: [] },
                cpt: { totalTrials: 54, targetRate: 0.22, sequence: [], currentTrial: 0, results: [], trialStartTime: 0,
                    displayTimer: null, interTrialTimer: null, canRespond: false, respondedThisTrial: false },
                visualSearch: { levels: [], currentLevel: 0, results: [], gridData: [], timeLeft: 0, timerInterval: null,
                    userAnswer: '', _levelStartTime: 0 },
                finalResults: null,
                testStartTime: 0,
            };

            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function randInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function showFeedback(emoji, type) {
                if (!feedbackFlash) return;
                feedbackFlash.textContent = emoji;
                feedbackFlash.className = 'feedback-flash';
                feedbackFlash.classList.add(type === 'correct' ? 'feedback-correct' : 'feedback-wrong');
                feedbackFlash.classList.remove('hidden');
                void feedbackFlash.offsetWidth;
                feedbackFlash.style.animation = 'none';
                void feedbackFlash.offsetWidth;
                feedbackFlash.style.animation = 'flashPop 0.6s ease-out forwards';
                setTimeout(() => { feedbackFlash.classList.add('hidden'); }, 600);
            }

            function showToast(message, duration = 2200) {
                if (!toast) return;
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, duration);
            }

            function formatTime(ms) {
                if (ms < 1000) return Math.round(ms) + 'ms';
                return (ms / 1000).toFixed(1) + 's';
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function sigmoidNorm(x, center, slope) {
                return 1 / (1 + Math.exp(-(x - center) * slope));
            }

            function invSigmoidNorm(x, center, slope) {
                return 1 / (1 + Math.exp((x - center) * slope));
            }

            function render(html) {
                app.innerHTML = html;
                const mainDiv = app.querySelector('.section');
                if (mainDiv) {
                    mainDiv.style.animation = 'none';
                    void mainDiv.offsetWidth;
                    mainDiv.style.animation = 'fadeSlideIn 0.4s ease';
                }
            }

            function updateProgress(current, total) {

                const label = document.querySelector('.progress-label');
                if (bar) bar.style.width = pct + '%';

            }
