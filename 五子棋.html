<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋</title>
    <link rel="icon" href="https://user-assets.sxlcdn.com/images/1209238/FlWuslNmGTHt1EipxUtq2GI6zqnN.png?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" type="image/png">
    <style>
        body {
            background: linear-gradient(135deg, #a2c2e5, #f3d9b1);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100vh;
        }

        canvas {
            display: block;
            margin: 40px auto;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            background-color: #fff;
            border-radius: 10px;
        }

        .btn-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            position: absolute;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
        }

        .btn-wrap div {
            margin: 0 15px;
        }

        div > span {
            display: inline-block;
            padding: 12px 25px;
            color: #fff;
            background-color: #6a85b3;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        div > span:hover {
            background-color: #4e6498;
            transform: scale(1.1);
        }

        #result-wrap {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            margin-top: 0px;
        }

        .start-options {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .start-options div {
            margin: 0 15px;
        }

        @media (max-width: 600px) {
            .btn-wrap {
                flex-direction: row;
                justify-content: center;
                margin-bottom: 10px;
            }

            .btn-wrap div {
                margin-right: 15px;
            }

            .btn-wrap div:last-child {
                margin-right: 0;
            }

            canvas {
                width: 90%;
                height: auto;
            }

            #result-wrap {
                font-size: 18px;
                margin-top: 0px;
            }
        }
    </style>
</head>
<body>
    <canvas id="chess" width="450px" height="450px"></canvas>
    <div id="result-wrap">--益智五子棋--</div>
    <div class="start-options">
        <div id="player-first">
            <span>玩家先手</span>
        </div>
        <div id="ai-first">
            <span>AI先手</span>
        </div>
    </div>
    <div class="btn-wrap" style="display: none;">
        <div id="undo" class="undo">
            <span>悔棋</span>
        </div>
        <div id="restart" class="restart">
            <span>重新开始</span>
        </div>
    </div>

    <script>
        var over = false;
        var me = false; // 默认false，防止未选择模式前落子
        var playerColor = 1; // 玩家颜色：1黑，2白
        var aiColor = 2; // AI颜色：2白，1黑
        var _nowi = 0, _nowj = 0; // 记录自己下棋的坐标
        var _compi = 0, _compj = 0; // 记录计算机当前下棋的坐标
        var lastMoveI = -1, lastMoveJ = -1; // 最后AI下棋位置，用于光环
        var chessBoard = [];  // 棋盘
        var myWin = [];
        var computerWin = [];
        var count = 0;  // 赢法总数
        var wins = [];  // 赢法
        var moveHistory = []; // 移动历史，用于悔棋

        for (var i = 0; i < 15; i++) {
            chessBoard[i] = [];
            for (var j = 0; j < 15; j++) {
                chessBoard[i][j] = 0;
            }
        }

        // 初始化赢法
        for (var i = 0; i < 15; i++) {
            wins[i] = [];
            for (var j = 0; j < 15; j++) {
                wins[i][j] = [];
            }
        }

        // 横线
        for (var i = 0; i < 15; i++) {
            for (var j = 0; j < 11; j++) {
                for (var k = 0; k < 5; k++) {
                    wins[i][j + k][count] = true;
                }
                count++;
            }
        }

        // 竖线
        for (var i = 0; i < 15; i++) {
            for (var j = 0; j < 11; j++) {
                for (var k = 0; k < 5; k++) {
                    wins[j + k][i][count] = true;
                }
                count++;
            }
        }

        // 正斜线
        for (var i = 0; i < 11; i++) {
            for (var j = 0; j < 11; j++) {
                for (var k = 0; k < 5; k++) {
                    wins[i + k][j + k][count] = true;
                }
                count++;
            }
        }

        // 反斜线
        for (var i = 0; i < 11; i++) {
            for (var j = 14; j > 3; j--) {
                for (var k = 0; k < 5; k++) {
                    wins[i + k][j - k][count] = true;
                }
                count++;
            }
        }

        // 初始化赢法统计
        for (var i = 0; i < count; i++) {
            myWin[i] = 0;
            computerWin[i] = 0;
        }

        var chess = document.getElementById("chess");
        var context = chess.getContext('2d');
        context.strokeStyle = '#bfbfbf'; // 恢复原灰色网格线

        // 画棋盘
        function drawChessBoard() {
            context.clearRect(0, 0, chess.width, chess.height);
            context.strokeStyle = '#bfbfbf'; // 确保每次绘制时都是灰色
            for (var i = 0; i < 15; i++) {
                context.moveTo(15 + i * 30, 15);
                context.lineTo(15 + i * 30, 435);
                context.stroke();
                context.moveTo(15, 15 + i * 30);
                context.lineTo(435, 15 + i * 30);
                context.stroke();
            }
        }

        // 重新绘制整个棋盘和棋子
        function redrawBoard() {
            drawChessBoard();
            for (var i = 0; i < 15; i++) {
                for (var j = 0; j < 15; j++) {
                    if (chessBoard[i][j] === 1) {
                        oneStep(i, j, true, false); // 黑棋
                    } else if (chessBoard[i][j] === 2) {
                        oneStep(i, j, false, true); // 白棋
                    }
                }
            }
            // 如果有最后AI移动，绘制光环
            if (lastMoveI !== -1 && lastMoveJ !== -1) {
                drawHighlight(lastMoveI, lastMoveJ);
            }
        }

        // 画棋子
        function oneStep(i, j, isBlack, isWhite) {
            context.beginPath();
            context.arc(15 + i * 30, 15 + j * 30, 13, 0, 2 * Math.PI);
            context.closePath();

            var gradient = context.createRadialGradient(15 + i * 30 + 2, 15 + j * 30 - 2, 13, 15 + i * 30 + 2, 15 + j * 30 - 2, 0);
            if (isWhite) {
                gradient.addColorStop(0, '#d1d1d1');
                gradient.addColorStop(1, '#f9f9f9');
            } else if (isBlack) {
                gradient.addColorStop(0, '#0a0a0a');
                gradient.addColorStop(1, '#636766');
            }
            context.fillStyle = gradient;
            context.fill();
        }

        // 绘制黄色光环
        function drawHighlight(i, j) {
            context.beginPath();
            context.arc(15 + i * 30, 15 + j * 30, 15, 0, 2 * Math.PI);
            context.closePath();
            context.strokeStyle = 'yellow';
            context.lineWidth = 2;
            context.stroke();
            context.strokeStyle = '#bfbfbf'; // 重设回灰色
        }

        // 绘制获胜红线
        function drawWinLine(winIndex) {
            var points = [];
            for (var x = 0; x < 15; x++) {
                for (var y = 0; y < 15; y++) {
                    if (wins[x][y][winIndex]) {
                        points.push({x: 15 + x * 30, y: 15 + y * 30});
                    }
                }
            }
            if (points.length >= 5) {
                context.beginPath();
                context.moveTo(points[0].x, points[0].y);
                context.lineTo(points[points.length - 1].x, points[points.length - 1].y);
                context.strokeStyle = 'red';
                context.lineWidth = 3;
                context.stroke();
                context.strokeStyle = '#bfbfbf'; // 重设回灰色
            }
        }

        // 启动时绘制棋盘，但隐藏按钮直到选择
        window.onload = function () {
            drawChessBoard();
            document.querySelector(".start-options").style.display = 'flex';
            document.querySelector(".btn-wrap").style.display = 'none';
        };

        // 玩家先手
        document.getElementById("player-first").onclick = function () {
            startGame(true);
        };

        // AI先手
        document.getElementById("ai-first").onclick = function () {
            startGame(false);
        };

        // 开始游戏
        function startGame(playerFirst) {
            document.querySelector(".start-options").style.display = 'none';
            document.querySelector(".btn-wrap").style.display = 'flex';
            over = false;
            me = playerFirst;
            playerColor = playerFirst ? 1 : 2;
            aiColor = playerFirst ? 2 : 1;
            resetBoard();
            if (!playerFirst) {
                computerAI();
            }
        }

        // 重置棋盘
        function resetBoard() {
            for (var i = 0; i < 15; i++) {
                for (var j = 0; j < 15; j++) {
                    chessBoard[i][j] = 0;
                }
            }
            for (var i = 0; i < count; i++) {
                myWin[i] = 0;
                computerWin[i] = 0;
            }
            moveHistory = [];
            lastMoveI = -1;
            lastMoveJ = -1;
            document.getElementById('result-wrap').innerHTML = '--益智五子棋--';
            redrawBoard();
        }

        // 重新开始
        document.getElementById("restart").onclick = function () {
            window.location.reload();
        };

        // 悔棋
        document.getElementById("undo").onclick = function () {
            if (over || moveHistory.length === 0 || !me) return; // 只允许玩家回合悔棋

            // 回退最后一步（AI的）
            var lastMove = moveHistory.pop();
            chessBoard[lastMove.i][lastMove.j] = 0;
            for (var k = 0; k < count; k++) {
                if (wins[lastMove.i][lastMove.j][k]) {
                    if (lastMove.who === 1) {
                        myWin[k]--;
                        if (myWin[k] <= 0) {
                            myWin[k] = 0;
                            computerWin[k] = 0;
                        }
                    } else {
                        computerWin[k]--;
                        if (computerWin[k] <= 0) {
                            computerWin[k] = 0;
                            myWin[k] = 0;
                        }
                    }
                }
            }

            // 如果还有移动，回退玩家的上一步
            if (moveHistory.length > 0) {
                lastMove = moveHistory.pop();
                chessBoard[lastMove.i][lastMove.j] = 0;
                for (var k = 0; k < count; k++) {
                    if (wins[lastMove.i][lastMove.j][k]) {
                        if (lastMove.who === 1) {
                            myWin[k]--;
                            if (myWin[k] <= 0) {
                                myWin[k] = 0;
                                computerWin[k] = 0;
                            }
                        } else {
                            computerWin[k]--;
                            if (computerWin[k] <= 0) {
                                computerWin[k] = 0;
                                myWin[k] = 0;
                            }
                        }
                    }
                }
            }

            // 更新最后AI移动的光环
            if (moveHistory.length > 0 && moveHistory[moveHistory.length - 1].who === aiColor) {
                var lastAIMove = moveHistory[moveHistory.length - 1];
                lastMoveI = lastAIMove.i;
                lastMoveJ = lastAIMove.j;
            } else {
                lastMoveI = -1;
                lastMoveJ = -1;
            }

            redrawBoard();
            me = true; // 轮到玩家
        };

        // 处理点击事件
        function handleMove(e) {
            if (over) return;
            if (!me) return;

            e.preventDefault();
            var clientX, clientY;

            if (e.type === 'touchstart') {
                var touch = e.touches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            var rect = chess.getBoundingClientRect();
            var scaleX = chess.width / rect.width;
            var scaleY = chess.height / rect.height;

            var x = (clientX - rect.left) * scaleX;
            var y = (clientY - rect.top) * scaleY;

            var i = Math.floor(x / 30);
            var j = Math.floor(y / 30);

            // 边界检查
            if (i < 0 || i >= 15 || j < 0 || j >= 15) return;

            if (chessBoard[i][j] == 0) {
                oneStep(i, j, playerColor === 1, playerColor === 2);
                chessBoard[i][j] = playerColor;
                moveHistory.push({i: i, j: j, who: playerColor});

                var winArray = playerColor === 1 ? myWin : computerWin;
                var oppWinArray = playerColor === 1 ? computerWin : myWin;
                var winText = '恭喜，你赢了！';

                for (var k = 0; k < count; k++) {
                    if (wins[i][j][k]) {
                        winArray[k]++;
                        oppWinArray[k] = 6;
                        if (winArray[k] === 5) {
                            document.getElementById('result-wrap').innerHTML = winText;
                            over = true;
                            drawWinLine(k);
                            document.querySelector(".undo").style.display = 'none'; // 结束时隐藏悔棋
                        }
                    }
                }

                if (!over) {
                    me = !me;
                    lastMoveI = -1; // 清除光环直到AI下
                    lastMoveJ = -1;
                    redrawBoard(); // 重新绘制以清除旧光环
                    computerAI();
                }
            }
        }

        // 绑定事件监听器
        chess.addEventListener('click', handleMove);
        chess.addEventListener('touchstart', handleMove);

        // 计算机下棋
        function computerAI() {
            var u = 0, v = 0;

            // AI先手第一步下天元 (7,7)
            if (moveHistory.length === 0) {
                u = 7;
                v = 7;
            } else {
                var myScore = [];
                var computerScore = [];
                var max = 0;
                var bestMoves = []; // 存储多个最高分的位置

                for (var i = 0; i < 15; i++) {
                    myScore[i] = [];
                    computerScore[i] = [];
                    for (var j = 0; j < 15; j++) {
                        myScore[i][j] = 0;
                        computerScore[i][j] = 0;
                    }
                }

                // 计算每个位置的得分
                for (var i = 0; i < 15; i++) {
                    for (var j = 0; j < 15; j++) {
                        if (chessBoard[i][j] == 0) {
                            for (var k = 0; k < count; k++) {
                                if (wins[i][j][k]) {
                                    if (myWin[k] == 1) myScore[i][j] += 200;
                                    else if (myWin[k] == 2) myScore[i][j] += 400;
                                    else if (myWin[k] == 3) myScore[i][j] += 2000;
                                    else if (myWin[k] == 4) myScore[i][j] += 10000;

                                    if (computerWin[k] == 1) computerScore[i][j] += 220;
                                    else if (computerWin[k] == 2) computerScore[i][j] += 420;
                                    else if (computerWin[k] == 3) computerScore[i][j] += 2100;
                                    else if (computerWin[k] == 4) computerScore[i][j] += 20000;
                                }
                            }

                            var score = aiColor === 1 ? myScore[i][j] : computerScore[i][j];
                            var oppScore = aiColor === 1 ? computerScore[i][j] : myScore[i][j];

                            var totalScore = Math.max(score, oppScore);

                            if (totalScore > max) {
                                max = totalScore;
                                bestMoves = [{ i: i, j: j }];
                            } else if (totalScore == max) {
                                bestMoves.push({ i: i, j: j });
                            }
                        }
                    }
                }

                // 如果有多个最佳位置，随机选择一个
                if (bestMoves.length > 0) {
                    var randomIndex = Math.floor(Math.random() * bestMoves.length);
                    u = bestMoves[randomIndex].i;
                    v = bestMoves[randomIndex].j;
                }
            }

            // 延迟AI下棋
            setTimeout(() => {
                oneStep(u, v, aiColor === 1, aiColor === 2);
                chessBoard[u][v] = aiColor;
                moveHistory.push({i: u, j: v, who: aiColor});
                lastMoveI = u;
                lastMoveJ = v;
                drawHighlight(u, v);

                var winArray = aiColor === 1 ? myWin : computerWin;
                var oppWinArray = aiColor === 1 ? computerWin : myWin;
                var winText = '计算机赢了，继续加油哦！';

                // 检查AI是否获胜
                for (var k = 0; k < count; k++) {
                    if (wins[u][v][k]) {
                        winArray[k]++;
                        oppWinArray[k] = 6;
                        if (winArray[k] === 5) {
                            document.getElementById('result-wrap').innerHTML = winText;
                            over = true;
                            drawWinLine(k);
                            document.querySelector(".undo").style.display = 'none'; // 结束时隐藏悔棋
                        }
                    }
                }

                if (!over) {
                    me = !me;
                }
            }, 800); // 延迟800毫秒再下棋
        }
    </script>
</body>
</html>
