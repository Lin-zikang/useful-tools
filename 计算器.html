<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>计算器</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      width: 100vw; min-height: 100vh;
      overflow-x: hidden; overflow-y: auto;
      font-family: 'SF Pro Display', -apple-system, Roboto, sans-serif;
      background: linear-gradient(135deg,#1c262e,#233440,#0f1418);
      display: flex; justify-content: center; align-items: flex-start;
      padding-top: 40px; padding-bottom: 40px;
      position: relative;
    }

    .bg-glow {
      position: absolute; width: 100%; height: 100%; z-index: -1;
      background: radial-gradient(circle at 50% 30%, rgba(79,172,254,0.15), transparent 60%);
      animation: breathe 8s ease-in-out infinite alternate;
    }
    @keyframes breathe { 0%{opacity:.5;transform:scale(.95)}100%{opacity:1;transform:scale(1.05)} }

    /* --- 计算器主体（关键调整：固定宽度策略 & 屏蔽横向溢出） --- */
    .calculator {
      width: clamp(300px, 90vw, 380px);
      height: 90vh; max-height: 700px;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; position: relative;
      overflow-x: hidden; /* 阻止任何水平方向溢出 */
      overflow-y: visible;
    }

    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; height:30px; flex-shrink:0; }
    .app-title { font-size:13px; letter-spacing:1px; color:rgba(255,255,255,.4); font-weight:600; text-transform:uppercase; }

    .screen {
      flex-grow:1; background: rgba(0,0,0,0.25); border-radius:20px;
      padding:15px 20px; text-align:right; margin-bottom:20px;
      display:flex; flex-direction:column; justify-content:flex-end; overflow:hidden; min-height:120px;
    }
    #history-display { font-family:monospace; font-size:14px; color:rgba(255,255,255,.5); height:20px; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #main-display {
      width:100%; background:transparent; border:none; color:#fff; font-size:42px; text-align:right;
      font-family:'SF Pro Display', sans-serif; font-weight:300; padding:0; margin:0; outline:none;
      word-break:break-all; line-height:1.1; max-height:150px; overflow-y:auto;
    }
    #main-display::-webkit-scrollbar{ width:0; }

    /* --- 键盘（关键：让网格列均分并且行高可控） --- */
    .keypad {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      flex-shrink:0;
      width: 100%;
      grid-auto-rows: minmax(48px, auto);
    }

    .btn {
      position:relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05);
      color: #e0e0e0; font-size:20px;
      padding: 8px;
      min-height: 54px;
      border-radius: 16px;
      cursor:pointer; display:flex; justify-content:center; align-items:center;
      transition: all .1s; user-select:none; font-family:inherit;
      min-width: 0; /* 允许网格项缩小，避免被内在最小宽度撑开 */
      max-width: 100%;
      box-sizing: border-box;
    }

    .btn:active { transform: scale(.92); background: rgba(255,255,255,0.15); }

    .btn.ac { color:#ff6b6b; background: rgba(255,107,107,0.08); }
    .btn.del { color:#ff6b6b; font-size:16px; }
    .btn.func { color:#5dade2; font-size:16px; }
    .btn.op { color:#4fc3f7; font-size:24px; font-weight:400; }

    .btn.equal {
      grid-column: span 2;
      background: linear-gradient(90deg,#00c6ff,#0072ff);
      border: none; color:#fff; font-size:28px; box-shadow:0 4px 20px rgba(0,114,255,0.4);
      justify-self: stretch; align-self: stretch;
      max-width: 100%;
    }

    @media (max-height: 650px) {
      .calculator { padding:15px; border-radius:20px; }
      .screen { min-height:80px; margin-bottom:10px; }
      .keypad { gap:8px; }
      .btn { font-size:18px; border-radius:12px; min-height:44px; }
    }

    /* 在极窄屏幕回退：等号键退为占 1 列，避免撑出容器 */
    @media (max-width: 360px) {
      .calculator { padding:12px; }
      .btn.equal { grid-column: span 1; font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="calculator">
    <div class="header">
      <div class="app-title">Scientific Calc</div>
      <div style="width:36px; height:22px;"></div>
    </div>

    <div class="screen">
      <div id="history-display"></div>
      <textarea id="main-display" readonly>0</textarea>
    </div>

    <div class="keypad">
      <div class="btn ac" onclick="calc.clear()">AC</div>
      <div class="btn del" onclick="calc.del()">DEL</div>
      <div class="btn func" onclick="calc.append('(')">(</div>
      <div class="btn func" onclick="calc.append(')')">)</div>

      <div class="btn func" onclick="calc.append('sin(')">sin</div>
      <div class="btn func" onclick="calc.append('cos(')">cos</div>
      <div class="btn func" onclick="calc.append('sqrt(')">√</div>
      <div class="btn func" onclick="calc.append('^')">^</div>

      <div class="btn func" onclick="calc.append('pi')">π</div>
      <div class="btn func" onclick="calc.append('e')">e</div>
      <div class="btn func" onclick="calc.append('log(')">log</div>
      <div class="btn op" onclick="calc.append('/')">÷</div>

      <div class="btn" onclick="calc.append('7')">7</div>
      <div class="btn" onclick="calc.append('8')">8</div>
      <div class="btn" onclick="calc.append('9')">9</div>
      <div class="btn op" onclick="calc.append('*')">×</div>

      <div class="btn" onclick="calc.append('4')">4</div>
      <div class="btn" onclick="calc.append('5')">5</div>
      <div class="btn" onclick="calc.append('6')">6</div>
      <div class="btn op" onclick="calc.append('-')">-</div>

      <div class="btn" onclick="calc.append('1')">1</div>
      <div class="btn" onclick="calc.append('2')">2</div>
      <div class="btn" onclick="calc.append('3')">3</div>
      <div class="btn op" onclick="calc.append('+')">+</div>

      <div class="btn" onclick="calc.append('0')">0</div>
      <div class="btn" onclick="calc.append('.')">.</div>
      <div class="btn equal" onclick="calc.calculate()">=</div>
    </div>
  </div>

  <script>
    /**
     * 简化版计算逻辑：使用浏览器的 Math 引擎进行求值。
     * 注意：evaluateStandard 使用词边界替换来避免把字母替换到其它标识符中。
     */

    const calc = {
      display: document.getElementById('main-display'),
      history: document.getElementById('history-display'),
      expr: '', isResult:false,

      append(val){
        if (this.isResult) {
          if (['+','-','*','/','^'].includes(val)) {
            this.isResult = false;
          } else {
            this.expr = '';
            this.isResult = false;
          }
        }
        this.expr += val;
        this.updateView();
      },

      del(){
        if (this.isResult) {
          this.expr = '';
          this.isResult = false;
        } else {
          this.expr = this.expr.slice(0, -1);
        }
        this.updateView();
      },

      clear(){
        this.expr = '';
        this.history.innerText = '';
        this.display.value = '0';
        this.isResult = false;
      },

      updateView(){
        let view = this.expr.replace(/\*/g, '×').replace(/\//g, '÷');
        this.display.value = view || '0';
        this.display.scrollTop = this.display.scrollHeight;
      },

      calculate(){
        if (!this.expr) return;
        this.history.innerText = this.expr.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';

        try {
          let res = this.evaluateStandard(this.expr);
          this.display.value = res;
          this.expr = res;
          this.isResult = true;
        } catch (e) {
          this.display.value = "Error";
          console.error(e);
          this.expr = '';
        }
      },

      evaluateStandard(str){
        // 用词边界替换以避免误替换（例如避免把 sin 中的 s 被替换等）
        let safe = str
          .replace(/\bsin\b/g, 'Math.sin')
          .replace(/\bcos\b/g, 'Math.cos')
          .replace(/\btan\b/g, 'Math.tan')
          .replace(/\bsqrt\b/g, 'Math.sqrt')
          .replace(/\blog\b/g, 'Math.log10')   // 这里 log 为以 10 为底的对数（与早期代码一致）
          .replace(/\bpi\b/g, 'Math.PI')
          .replace(/\be\b/g, 'Math.E')
          .replace(/\^/g, '**');

        // 创建并执行函数（注意：只在受信任环境下使用）
        let res = new Function('return ' + safe)();
        // 修复浮点精度显示问题（限制有效位数）
        return parseFloat(res.toPrecision(14)).toString();
      }
    };
  </script>
</body>
</html>
