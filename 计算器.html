<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" href="https://user-assets.sxlcdn.com/images/1209238/FlWuslNmGTHt1EipxUtq2GI6zqnN.png?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" type="image/png">
  <title>计算器</title>
  
  <style>
    /* --- 核心修复：布局锁定（已调整，允许纵向滚动） --- */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      min-height: 100vh; /* 使用 min-height 以允许内容超过视窗时滚动 */
      /* 允许纵向滚动，禁止横向滚动以防止横向布局跑版 */
      overflow-x: hidden;
      overflow-y: auto;
      position: relative; /* 不再固定页面，允许自然流动 */
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: linear-gradient(135deg, #1c262e, #233440, #0f1418);
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 顶部对齐，避免在可滚动页面上垂直居中导致的问题 */
      padding-top: 40px; /* 顶部间距，使页面不紧贴顶部 */
      padding-bottom: 40px; /* 底部间距，方便滚动时有缓冲 */
    }

    /* 背景光效动画 */
    .bg-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 30%, rgba(79, 172, 254, 0.15), transparent 60%);
      animation: breathe 8s ease-in-out infinite alternate;
    }
    @keyframes breathe {
      0% { opacity: 0.5; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    /* --- 计算器主体 --- */
    .calculator {
      width: 90vw;
      max-width: 380px;
      /* 限制高度，适配小屏手机 */
      height: 90vh; 
      max-height: 700px; 
      padding: 24px;
      /* 高级玻璃拟态 */
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      height: 30px;
      flex-shrink: 0; /* 防止被压缩 */
    }
    .app-title {
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      text-transform: uppercase;
    }

    /* 开关组件（已移除高精度后不再使用，但保留样式以防未来扩展） */
    .switch-container {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.3);
      transition: .3s;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: #fff;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #0088cc; border-color: #0088cc; }
    input:checked + .slider:before { transform: translateX(18px); }

    /* --- 屏幕区域 --- */
    .screen {
      flex-grow: 1; /* 占据剩余空间 */
      background: rgba(0, 0, 0, 0.25);
      border-radius: 20px;
      padding: 15px 20px;
      text-align: right;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      min-height: 120px; /* 保证最小高度 */
    }
    
    #history-display {
      font-family: monospace;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      height: 20px;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #main-display {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 42px;
      text-align: right;
      font-family: 'SF Pro Display', sans-serif;
      font-weight: 300;
      padding: 0;
      margin: 0;
      outline: none;
      word-break: break-all;
      line-height: 1.1;
      /* 处理长结果显示 */
      max-height: 150px;
      overflow-y: auto;
    }
    /* 隐藏滚动条 */
    #main-display::-webkit-scrollbar { width: 0; }

    /* --- 键盘区域 --- */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      flex-shrink: 0; /* 键盘不可压缩 */
      height: auto;
    }

    .btn {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #e0e0e0;
      font-size: 20px;
      /* 自适应高度，保持方形比例 */
      aspect-ratio: 1.3; 
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.1s;
      user-select: none;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }

    /* 颜色分类 */
    .btn.ac { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
    .btn.del { color: #ff6b6b; font-size: 16px; }
    .btn.func { color: #5dade2; font-size: 16px; }
    .btn.op { color: #4fc3f7; font-size: 24px; font-weight: 400; }
    
    .btn.equal {
      grid-column: span 2;
      aspect-ratio: auto; /* 覆盖比例 */
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border: none;
      color: #fff;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(0, 114, 255, 0.4);
    }

    /* 适配极小屏幕 */
    @media (max-height: 650px) {
      .calculator { padding: 15px; border-radius: 20px; }
      .screen { min-height: 80px; margin-bottom: 10px; }
      .keypad { gap: 8px; }
      .btn { font-size: 18px; border-radius: 12px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="calculator">
    <div class="header">
      <div class="app-title">Scientific Calc</div>
      <!-- 高精度开关已移除，为了保持对齐占位留空 -->
      <div style="width:36px; height:22px;"></div>
    </div>

    <div class="screen">
      <div id="history-display"></div>
      <textarea id="main-display" readonly>0</textarea>
    </div>

    <div class="keypad">
      <div class="btn ac" onclick="calc.clear()">AC</div>
      <div class="btn del" onclick="calc.del()">DEL</div>
      <div class="btn func" onclick="calc.append('(')">(</div>
      <div class="btn func" onclick="calc.append(')')">)</div>

      <div class="btn func" onclick="calc.append('sin(')">sin</div>
      <div class="btn func" onclick="calc.append('cos(')">cos</div>
      <div class="btn func" onclick="calc.append('sqrt(')">√</div>
      <div class="btn func" onclick="calc.append('^')">^</div>

      <div class="btn func" onclick="calc.append('pi')">π</div>
      <div class="btn func" onclick="calc.append('e')">e</div>
      <div class="btn func" onclick="calc.append('log(')">log</div>
      <div class="btn op" onclick="calc.append('/')">÷</div>

      <div class="btn" onclick="calc.append('7')">7</div>
      <div class="btn" onclick="calc.append('8')">8</div>
      <div class="btn" onclick="calc.append('9')">9</div>
      <div class="btn op" onclick="calc.append('*')">×</div>

      <div class="btn" onclick="calc.append('4')">4</div>
      <div class="btn" onclick="calc.append('5')">5</div>
      <div class="btn" onclick="calc.append('6')">6</div>
      <div class="btn op" onclick="calc.append('-')">-</div>

      <div class="btn" onclick="calc.append('1')">1</div>
      <div class="btn" onclick="calc.append('2')">2</div>
      <div class="btn" onclick="calc.append('3')">3</div>
      <div class="btn op" onclick="calc.append('+')">+</div>

      <div class="btn" onclick="calc.append('0')">0</div>
      <div class="btn" onclick="calc.append('.')">.</div>
      <div class="btn equal" onclick="calc.calculate()">=</div>
    </div>
  </div>

  <script>
    /**
     * 简化版：已移除高精度分数引擎，始终使用浏览器 Math / 标准求值。
     */

    const calc = {
      display: document.getElementById('main-display'),
      history: document.getElementById('history-display'),
      expr: '',
      isResult: false,

      append(val) {
        if (this.isResult) {
          // 如果刚算出结果，输入运算符则继续，输入数字则清空
          if (['+','-','*','/','^'].includes(val)) {
            this.isResult = false;
          } else {
            this.expr = '';
            this.isResult = false;
          }
        }
        this.expr += val;
        this.updateView();
      },

      del() {
        if (this.isResult) {
          this.expr = '';
          this.isResult = false;
        } else {
          this.expr = this.expr.slice(0, -1);
        }
        this.updateView();
      },

      clear() {
        this.expr = '';
        this.history.innerText = '';
        this.display.value = '0';
        this.isResult = false;
      },

      updateView() {
        let view = this.expr.replace(/\*/g, '×').replace(/\//g, '÷');
        this.display.value = view || '0';
        this.display.scrollTop = this.display.scrollHeight;
      },

      calculate() {
        if (!this.expr) return;
        
        // 视觉历史记录
        this.history.innerText = this.expr.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';
        
        try {
          // 一律使用标准 JS/Math 引擎进行计算（已移除高精度分支）
          let res = this.evaluateStandard(this.expr);
          this.display.value = res;
          this.expr = res;
          this.isResult = true;
        } catch (e) {
          this.display.value = "Error";
          console.error(e);
          this.expr = '';
        }
      },

      // 标准计算 (Function eval)
      evaluateStandard(str) {
        let safe = str
          .replace(/sin/g, 'Math.sin')
          .replace(/cos/g, 'Math.cos')
          .replace(/tan/g, 'Math.tan')
          .replace(/sqrt/g, 'Math.sqrt')
          .replace(/log/g, 'Math.log10')
          .replace(/pi/g, 'Math.PI')
          .replace(/e/g, 'Math.E')
          .replace(/\^/g, '**');
        let res = new Function('return ' + safe)();
        // 修复 js 浮点数精度 bug (0.3000000004)
        return parseFloat(res.toPrecision(14)).toString();
      }
    };
  </script>
</body>
</html>
